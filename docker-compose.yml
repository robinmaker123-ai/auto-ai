services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./database:/app/database
      - ./backend/uploads:/app/backend/uploads
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: /api/v1
    depends_on:
      - backend
    ports:
      - "5173:80"
    restart: unless-stopped
